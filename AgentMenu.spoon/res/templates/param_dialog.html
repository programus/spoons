<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design tokens ──────────────────────────────────────────────────────── */
:root {
  --bg:        #f5f5f5;
  --bg2:       #e8e8e8;
  --bg3:       #d0d0d0;
  --border:    #ccc;
  --text:      #111;
  --text-dim:  #666;
  --btn-bg:    #ddd;
  --btn-text:  #111;
  --accent:    #0a84ff;
  --shadow:    rgba(0,0,0,0.2);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:        #1e1e1e;
    --bg2:       #2d2d2d;
    --bg3:       #3a3a3a;
    --border:    #444;
    --text:      #e0e0e0;
    --text-dim:  #aaa;
    --btn-bg:    #3a3a3a;
    --btn-text:  #e0e0e0;
    --accent:    #0a84ff;
    --shadow:    rgba(0,0,0,0.5);
  }
}

/* ── Layout ─────────────────────────────────────────────────────────────── */
body {
  font-family: -apple-system, Helvetica, sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  padding: 16px;
  gap: 10px;
}
.row { display: flex; flex-direction: column; gap: 4px; }
label { font-size: 12px; color: var(--text-dim); }

/* ── Text input ─────────────────────────────────────────────────────────── */
input[type=text] {
  width: 100%;
  padding: 6px 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
input[type=text]:focus { border-color: var(--accent); }

/* ── Buttons ────────────────────────────────────────────────────────────── */
.buttons {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: auto;
}
button {
  padding: 6px 18px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  cursor: pointer;
}
#btn-ok     { background: var(--accent); color: #fff; }
#btn-cancel { background: var(--btn-bg); color: var(--btn-text); }
button:hover { opacity: 0.85; }

/* ── Combobox ───────────────────────────────────────────────────────────── */
.cb-wrap {
  position: relative;
  display: flex;
}
.cb-wrap input[type=text] {
  flex: 1;
  border-radius: 5px 0 0 5px;
  border-right: none;
}
.cb-arrow {
  padding: 0 8px;
  background: var(--btn-bg);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 5px 5px 0;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 10px;
  flex-shrink: 0;
}
.cb-arrow:hover { background: var(--bg3); opacity: 1; }
.cb-dropdown {
  display: none;
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 5px;
  box-shadow: 0 4px 12px var(--shadow);
  z-index: 100;
  overflow-y: auto;
}
.cb-dropdown.open { display: block; }
.cb-option {
  padding: 6px 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text);
}
.cb-option:hover { background: var(--bg3); }
</style>
</head>
<body>

{{FORM_ROWS}}

<div class="buttons">
  <button id="btn-cancel" onclick="cancel()">{{PARAM_CANCEL_LABEL}}</button>
  <button id="btn-ok" onclick="submit()">{{PARAM_OK_LABEL}}</button>
</div>

<script>
var names = [{{PARAM_NAMES}}];

function collect() {
  var vals = {};
  names.forEach(function(n) {
    var el = document.getElementById("param_" + n);
    vals[n] = el ? el.value : "";
  });
  return vals;
}
function submit() {
  webkit.messageHandlers.agentMenuParams.postMessage({ action: "submit", values: collect() });
}
function cancel() {
  webkit.messageHandlers.agentMenuParams.postMessage({ action: "cancel" });
}
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter")  { submit(); }
  if (e.key === "Escape") { cancel(); }
});

// Focus first input on load
window.onload = function() {
  var first = document.querySelector("input[type=text]");
  if (first) first.focus();
};

// ── Combobox helpers ───────────────────────────────────────────────────────
function cbToggle(inputId) {
  var drop = document.getElementById("drop_" + inputId);
  if (!drop) return;
  var wasOpen = drop.classList.contains("open");
  cbCloseAll();
  if (!wasOpen) {
    var wrap = document.getElementById(inputId).closest(".cb-wrap");
    var rect = wrap.getBoundingClientRect();
    var gap = 2;
    var maxH = Math.min(180, window.innerHeight - rect.bottom - gap - 6);
    drop.style.left      = rect.left + "px";
    drop.style.width     = rect.width + "px";
    drop.style.top       = (rect.bottom + gap) + "px";
    drop.style.maxHeight = maxH + "px";
    drop.classList.add("open");
  }
}
function cbSelect(inputId, value) {
  var el = document.getElementById(inputId);
  if (el) el.value = value;
  cbCloseAll();
}
function cbCloseAll() {
  document.querySelectorAll(".cb-dropdown.open").forEach(function(d) {
    d.classList.remove("open");
  });
}
document.addEventListener("click", function(e) {
  if (!e.target.closest(".cb-wrap")) cbCloseAll();
});
</script>

</body>
</html>

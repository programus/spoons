<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design tokens ──────────────────────────────────────────────────────── */
:root {
  --bg:        #f5f5f5;
  --bg2:       #e8e8e8;
  --bg3:       #d0d0d0;
  --border:    #ccc;
  --text:      #111;
  --text-dim:  #666;
  --btn-bg:    #ddd;
  --btn-text:  #111;
  --accent:    #0a84ff;
  --shadow:    rgba(0,0,0,0.2);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:        #1e1e1e;
    --bg2:       #2d2d2d;
    --bg3:       #3a3a3a;
    --border:    #444;
    --text:      #e0e0e0;
    --text-dim:  #aaa;
    --btn-bg:    #3a3a3a;
    --btn-text:  #e0e0e0;
    --accent:    #0a84ff;
    --shadow:    rgba(0,0,0,0.5);
  }
}

/* ── Layout ─────────────────────────────────────────────────────────────── */
body {
  font-family: -apple-system, Helvetica, sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  padding: 16px;
  gap: 10px;
}
.row { display: flex; flex-direction: column; gap: 4px; }
label { font-size: 12px; color: var(--text-dim); }

/* ── Text input / textarea ──────────────────────────────────────────────── */
input[type=text], textarea {
  width: 100%;
  padding: 6px 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
input[type=text]:focus, textarea:focus { border-color: var(--accent); }
textarea {
  resize: none;
  min-height: 60px;
  max-height: 200px;
  overflow-y: auto;
  line-height: 1.4;
}

/* ── Buttons ────────────────────────────────────────────────────────────── */
.buttons {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: auto;
}
button {
  padding: 6px 18px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  cursor: pointer;
}
#btn-ok     { background: var(--accent); color: #fff; }
#btn-cancel { background: var(--btn-bg); color: var(--btn-text); }
button:hover { opacity: 0.85; }

/* ── Combobox ───────────────────────────────────────────────────────────── */
.cb-wrap {
  position: relative;
  display: flex;
}
.cb-wrap input[type=text] {
  flex: 1;
  border-radius: 5px 0 0 5px;
  border-right: none;
}
.cb-arrow {
  padding: 0 8px;
  background: var(--btn-bg);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 5px 5px 0;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 10px;
  flex-shrink: 0;
}
.cb-arrow:hover { background: var(--bg3); opacity: 1; }
.cb-dropdown {
  display: none;
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 5px;
  box-shadow: 0 4px 12px var(--shadow);
  z-index: 100;
  overflow-y: auto;
}
.cb-dropdown.open { display: block; }
.cb-option {
  padding: 6px 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text);
}
.cb-option:hover { background: var(--bg3); }
</style>
</head>
<body>

<!-- ── Form rows will be injected here by JS ──────────────────────────────── -->
<div id="form-rows"></div>

<!-- ── Row template: plain textarea ────────────────────────────────────────── -->
<template id="tmpl-text">
  <div class="row">
    <label></label>
    <textarea autocomplete="off" rows="2"></textarea>
  </div>
</template>

<!-- ── Row template: combobox ───────────────────────────────────────────────── -->
<template id="tmpl-combo">
  <div class="row">
    <label></label>
    <div class="cb-wrap">
      <input type="text" autocomplete="off" />
      <button type="button" class="cb-arrow">&#9660;</button>
      <div class="cb-dropdown"></div>
    </div>
  </div>
</template>

<div class="buttons">
  <button id="btn-cancel" onclick="cancel()">{{PARAM_CANCEL_LABEL}}</button>
  <button id="btn-ok" onclick="submit()">{{PARAM_OK_LABEL}}</button>
</div>

<script>
var defs = {{PARAM_DEFS_JSON}};

// ── Build form rows from defs ────────────────────────────────────────────────
(function() {
  var container = document.getElementById("form-rows");
  defs.forEach(function(p) {
    var isCombo = Array.isArray(p.options) && p.options.length > 0;
    var frag = document.importNode(
      document.getElementById(isCombo ? "tmpl-combo" : "tmpl-text").content, true);

    var label = frag.querySelector("label");
    label.textContent = p.label || p.name;
    label.setAttribute("for", "param_" + p.name);

    if (isCombo) {
      var input = frag.querySelector("input[type=text]");
      input.id    = "param_" + p.name;
      input.name  = p.name;
      input.value = p.default || "";

      frag.querySelector(".cb-arrow").addEventListener("click", function() {
        cbToggle("param_" + p.name);
      });

      var drop = frag.querySelector(".cb-dropdown");
      drop.id = "drop_param_" + p.name;
      p.options.forEach(function(opt) {
        var div = document.createElement("div");
        div.className   = "cb-option";
        div.textContent = opt;
        div.addEventListener("click", function() { cbSelect("param_" + p.name, opt); });
        drop.appendChild(div);
      });
    } else {
      var ta = frag.querySelector("textarea");
      ta.id    = "param_" + p.name;
      ta.name  = p.name;
      ta.value = p.default || "";
      ta.addEventListener("input", function() {
        ta.style.height = "";
        ta.style.height = Math.min(ta.scrollHeight, 200) + "px";
      });
    }

    container.appendChild(frag);
  });
})();

// ── Form actions ─────────────────────────────────────────────────────────────
function collect() {
  var vals = {};
  defs.forEach(function(p) {
    var el = document.getElementById("param_" + p.name);
    vals[p.name] = el ? el.value : "";
  });
  return vals;
}
function submit() {
  webkit.messageHandlers.agentMenuParams.postMessage({ action: "submit", values: collect() });
}
function cancel() {
  webkit.messageHandlers.agentMenuParams.postMessage({ action: "cancel" });
}
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && e.metaKey) { e.preventDefault(); submit(); }
  if (e.key === "Escape") { cancel(); }
});

// Focus first field after rows are built
window.addEventListener("load", function() {
  var first = document.querySelector("#form-rows textarea, #form-rows input[type=text]");
  if (first) first.focus();
});

// ── Combobox helpers ─────────────────────────────────────────────────────────
function cbToggle(inputId) {
  var drop = document.getElementById("drop_" + inputId);
  if (!drop) return;
  var wasOpen = drop.classList.contains("open");
  cbCloseAll();
  if (!wasOpen) {
    var wrap = document.getElementById(inputId).closest(".cb-wrap");
    var rect = wrap.getBoundingClientRect();
    var gap = 2;
    var maxH = Math.min(180, window.innerHeight - rect.bottom - gap - 6);
    drop.style.left      = rect.left + "px";
    drop.style.width     = rect.width + "px";
    drop.style.top       = (rect.bottom + gap) + "px";
    drop.style.maxHeight = maxH + "px";
    drop.classList.add("open");
  }
}
function cbSelect(inputId, value) {
  var el = document.getElementById(inputId);
  if (el) el.value = value;
  cbCloseAll();
}
function cbCloseAll() {
  document.querySelectorAll(".cb-dropdown.open").forEach(function(d) {
    d.classList.remove("open");
  });
}
document.addEventListener("click", function(e) {
  if (!e.target.closest(".cb-wrap")) cbCloseAll();
});
</script>

</body>
</html>
